kind: hosted
name: toolbox-langgraph
description: LangGraph agent with Fabric Data Agent and tools via Foundry toolbox.
metadata:
  tags:
    - AI Agent Hosting
    - LangGraph
    - Fabric Data Agent
protocols:
  - protocol: responses
    version: 1.0.0
resources:
  cpu: "0.25"
  memory: 0.5Gi
environment_variables:
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
  - name: TOOLBOX_NAME
    value: ${TOOLBOX_NAME}
  - name: FABRIC_MCP_ENDPOINT
    value: ${FABRIC_MCP_ENDPOINT}
  - name: FABRIC_WORKSPACE_ID
    value: ${FABRIC_WORKSPACE_ID}
  - name: FABRIC_DATASET_ID
    value: ${FABRIC_DATASET_ID}
  - name: FABRIC_LAKEHOUSE_ID
    value: ${FABRIC_LAKEHOUSE_ID}
