kind: hosted
name: toolbox-langgraph
description: LangGraph agent with Fabric Data Agent and tools via Foundry toolbox.
metadata:
  tags:
    - AI Agent Hosting
    - LangGraph
    - Fabric Data Agent
protocols:
  - protocol: responses
    version: 1.0.0
resources:
  cpu: "1"
  memory: 2Gi
environment_variables:
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
  - name: TOOLBOX_NAME
    value: ${TOOLBOX_NAME}
  - name: FABRIC_MCP_ENDPOINT
    value: ${FABRIC_MCP_ENDPOINT}
  - name: LANGFUSE_PUBLIC_KEY
    value: ${LANGFUSE_PUBLIC_KEY}
  - name: LANGFUSE_SECRET_KEY
    value: ${LANGFUSE_SECRET_KEY}
  - name: LANGFUSE_HOST
    value: ${LANGFUSE_HOST}
  - name: LANGFUSE_BASE_URL
    value: ${LANGFUSE_HOST}
