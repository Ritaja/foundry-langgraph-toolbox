# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: toolbox-langgraph
displayName: "LangGraph + Fabric Data Agent Toolbox"
description: >
  LangGraph ReAct agent on Microsoft Foundry with a Fabric Data Agent
  connected via MCP through the Foundry toolbox (agent identity auth),
  plus platform-managed web search and code interpreter.
metadata:
  tags:
    - AI Agent Hosting
    - LangGraph
    - Fabric Data Agent
    - MCP
    - Microsoft Foundry
template:
  name: toolbox-langgraph
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: TOOLBOX_NAME
      value: "agent-tools"
resources:
  - kind: model
    id: gpt-4o
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
  - kind: toolbox
    name: agent-tools
    tools:
      - type: web_search
      - type: code_interpreter
      - type: mcp
        server_label: fabric-data-agent
        project_connection_id: fabric-data-agent-conn
