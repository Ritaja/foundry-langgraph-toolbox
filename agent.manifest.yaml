name: toolbox-langgraph
description: >
  LangGraph ReAct agent on Microsoft Foundry with Fabric Data Agent integrated
  as an MCP tool in the Foundry toolbox.  Queries Fabric lakehouses, warehouses,
  and semantic models through the platform-managed toolbox, augmented with web
  search and code interpreter capabilities.
metadata:
  tags:
    - AI Agent Hosting
    - LangGraph
    - Fabric Data Agent
    - MCP
    - Microsoft Foundry
template:
  name: toolbox-langgraph
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: TOOLBOX_NAME
      value: "agent-tools"
    - name: FABRIC_MCP_ENDPOINT
      value: "{{FABRIC_MCP_ENDPOINT}}"
resources:
  - kind: model
    id: gpt-5.4-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
  - kind: toolbox
    name: agent-tools
    tools:
      - type: mcp
        server_label: fabric_data_agent
        server_url: "{{FABRIC_MCP_ENDPOINT}}"
        require_approval: never
      - type: web_search
      - type: code_interpreter
